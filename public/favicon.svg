<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f14"/>
      <stop offset="100%" stop-color="#0e141a"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="16" height="16" rx="3" fill="url(#bg)"/>

  <!-- outer ring -->
  <circle cx="8" cy="8" r="6.5" fill="none" stroke="#1c2a35" stroke-width="1"/>

  <!-- wave (left) -->
  <path d="M3.2 10.5
           C4.5 7.5, 7.2 7.2, 8.4 9
           C7.6 6.2, 4.6 5.6, 2.8 9
           C3 9.3, 3.1 9.9, 3.2 10.5 Z"
        fill="#3ec7f3"/>

  <!-- wave highlight -->
  <path d="M4.1 9.6
           C5.2 8.2, 6.6 8.3, 7.5 9.1
           C6.2 8.9, 5.3 9.2, 4.6 10.2 Z"
        fill="#bff3ff"/>

  <!-- flame (right) -->
  <path d="M11 3.5
           C9.8 5.3, 10.2 6.7, 11.4 8.2
           C10 7.8, 9.1 6.5, 9.8 4.8
           C8.4 6.2, 8.3 8.4, 9.5 9.9
           C10.7 11.2, 13 10.6, 13 8.2
           C13 6.8, 12.4 5.6, 11 3.5 Z"
        fill="#ff6a2b"/>

  <!-- flame highlight -->
  <path d="M11.2 5.4
           C10.6 6.3, 10.9 7.2, 11.6 8
           C10.9 7.7, 10.5 7, 10.8 6
           C10.2 6.9, 10.3 8, 10.9 8.7
           C11.5 9.3, 12.6 9, 12.6 7.9
           C12.6 7.2, 12.2 6.4, 11.2 5.4 Z"
        fill="#ffd166"/>

</svg>
